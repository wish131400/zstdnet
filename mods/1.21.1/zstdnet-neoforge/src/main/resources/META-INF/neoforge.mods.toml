modLoader="javafml"
loaderVersion="[1,)"
license="MIT"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayTest="IGNORE_SERVER_VERSION"
description='''
NeoForge 1.21.1 source-maintainable Zstd proxy mod.
Automatically hijacks client connects, supports LAN host publishing, HUD stats,
and dedicated-server zstd forwarding via config/zstdnet-server.properties.
'''

[features.${mod_id}]
javaVersion="[21,)"

[[dependencies.${mod_id}]]
modId="neoforge"
type="required"
versionRange="[${neo_version},)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
type="required"
versionRange="[1.21.1,1.22)"
ordering="NONE"
side="BOTH"
